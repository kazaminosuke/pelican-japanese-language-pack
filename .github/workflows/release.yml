name: Auto Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugin.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r '.version' plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.check.outputs.exists == 'false'
        run: |
          zip -r japanese-language-pack.zip . -x ".git/*" -x ".github/*"

      - name: Generate release notes
        if: steps.check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "## 変更内容" > release_notes.md
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --no-merges --pretty=format:'- %s' \
              | grep -Ev '^- chore: bump (version|update\.json) to' >> release_notes.md || true
          else
            git log --no-merges --pretty=format:'- %s' \
              | grep -Ev '^- chore: bump (version|update\.json) to' >> release_notes.md || true
          fi

          if [ -n "$PREV_TAG" ]; then
            printf '\n\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREV_TAG" "${{ steps.version.outputs.version }}" >> release_notes.md
          fi

          cat release_notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            japanese-language-pack.zip \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md

      - name: Update update.json
        if: steps.check.outputs.exists == 'false'
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
             '.["*"].version = $v | .["*"].download_url = "https://github.com/${{ github.repository }}/releases/latest/download/japanese-language-pack.zip"' \
             update.json > update.json.tmp
          mv update.json.tmp update.json

      - name: Commit updated update.json
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --quiet --cached || git commit -m "chore: bump update.json to v${{ steps.version.outputs.version }}"
          git push
